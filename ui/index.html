<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titan Compressor | Ultra-X Engine</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-mesh"></div>
    
    <main class="app-container">
        <header>
            <div class="logo">
                <span class="logo-icon">💠</span>
                <h1>TITAN<span>COMPRESS</span></h1>
            </div>
            <div class="badge">ULTRA-X SOTA</div>
        </header>

        <section class="drop-zone" id="drop-zone">
            <div class="drop-content">
                <div class="icon-pulse">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                </div>
                <h2>Drop Files to Compress</h2>
                <p>Support for Titan-Glass & LZ-Ultra Engines</p>
                <button class="btn-primary" onclick="document.getElementById('file-input').click()">Select Files</button>
                <input type="file" id="file-input" hidden multiple>
            </div>
        </section>

        <section class="stats-grid">
            <div class="stat-card">
                <label>Compression Ratio</label>
                <div class="value" id="ratio-val">0.0:1</div>
                <div class="progress-bar"><div class="fill" style="width: 0%"></div></div>
            </div>
            <div class="stat-card">
                <label>Processing Speed</label>
                <div class="value" id="speed-val">0 MB/s</div>
                <div class="sub-label">Arithmetic Coder Active</div>
            </div>
            <div class="stat-card">
                <label>Space Saved</label>
                <div class="value" id="saved-val">0 KB</div>
                <div class="sub-label">Lossless Guarantee</div>
            </div>
        </section>

        <footer class="controls">
            <div class="engine-selector">
                <label>Engine:</label>
                <select id="engine-select">
                    <option value="lz-ultra">LZ-Ultra (Fast)</option>
                    <option value="titan-glass">Titan-Glass (Random Access)</option>
                    <option value="amit-ultra-x">AmitUltra-X (Extreme)</option>
                </select>
            </div>
            <button class="btn-secondary" id="btn-decompress">Decompress</button>
        </footer>
    </main>

    <div class="scanline"></div>
    <script type="module" src="main.js"></script>
</body>
</html>
