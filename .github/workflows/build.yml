name: Build & Sign Titan Compressor
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    permissions:
      contents: write
    runs-on: windows-latest
    env:
      WINDOWS_CERTIFICATE_PATH: ""
      WINDOWS_CERTIFICATE_PASSWORD: ""
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install frontend dependencies
        run: npm install

      - name: build frontend
        run: npm run build

      - name: generate icon.ico from PNG
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.Drawing
          $src = [System.Drawing.Image]::FromFile("src-tauri/icons/icon.png")
          $ico = New-Object System.Drawing.Icon($src.GetThumbnailImage(32,32,$null,[System.IntPtr]::Zero))
          # Use magick if available, else copy png as placeholder
          if (Get-Command magick -ErrorAction SilentlyContinue) {
            magick src-tauri/icons/icon.png -resize 256x256 src-tauri/icons/icon.ico
          } else {
            # tauri-build accepts png when no .ico is explicitly required in bundle.icon
            Write-Host "ImageMagick not found, skipping ICO generation"
          }

      - name: generate windows certificate
        shell: pwsh
        run: |
          $cert = New-SelfSignedCertificate -Type Custom -Subject "CN=TitanCompress" -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3") -KeyUsage DigitalSignature -FriendlyName "TitanCompress" -CertStoreLocation "Cert:\CurrentUser\My"
          $password = ConvertTo-SecureString -String "titan123" -Force -AsPlainText
          Export-PfxCertificate -Cert $cert -FilePath "titan.pfx" -Password $password
          echo "WINDOWS_CERTIFICATE_PATH=${{ github.workspace }}\titan.pfx" >> $env:GITHUB_ENV
          echo "WINDOWS_CERTIFICATE_PASSWORD=titan123" >> $env:GITHUB_ENV

      - name: build desktop (.exe)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WINDOWS_PFX: ${{ env.WINDOWS_CERTIFICATE_PATH }}
          WINDOWS_PFX_PASSWORD: ${{ env.WINDOWS_CERTIFICATE_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "Titan Compressor v__VERSION__"
          releaseBody: "SOTA Signed Build for Windows."
          releaseDraft: true
          prerelease: false

  build-android:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    env:
      TITAN_KEYSTORE_PATH: ""
      TITAN_KEYSTORE_PASSWORD: ""
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: setup Android SDK
        uses: android-actions/setup-android@v3

      - name: install NDK
        run: sdkmanager "ndk;27.0.12077973"

      - name: install linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: install frontend dependencies
        run: npm install

      - name: build frontend
        run: npm run build

      - name: init Tauri Android
        run: npm run tauri android init

      - name: generate android keystore
        run: |
          keytool -genkey -v -keystore release.keystore -alias titan-alias -keyalg RSA -keysize 2048 -validity 10000 -storepass "titan123" -keypass "titan123" -dname "CN=Titan, OU=Compressor, O=TitanEngines, L=Delhi, S=Delhi, C=IN"
          echo "TITAN_KEYSTORE_PATH=${{ github.workspace }}/release.keystore" >> $GITHUB_ENV
          echo "TITAN_KEYSTORE_PASSWORD=titan123" >> $GITHUB_ENV

      - name: build android (.apk)
        run: npm run tauri android build -- --apk
        env:
          TAURI_ANDROID_KEYSTORE_PATH: ${{ env.TITAN_KEYSTORE_PATH }}
          TAURI_ANDROID_KEYSTORE_PASSWORD: ${{ env.TITAN_KEYSTORE_PASSWORD }}
          TAURI_ANDROID_KEY_ALIAS: titan-alias
          TAURI_ANDROID_KEY_PASSWORD: "titan123"
          NDK_HOME: ${{ env.ANDROID_NDK_ROOT }}

      - name: upload APK
        uses: actions/upload-artifact@v4
        with:
          name: titan-compressor-android
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
