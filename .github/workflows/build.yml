name: Build & Sign Titan Compressor
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.platform }}
    env:
      TITAN_KEYSTORE_PATH: ""
      TITAN_KEYSTORE_PASSWORD: ""
      WINDOWS_CERTIFICATE_PATH: ""
      WINDOWS_CERTIFICATE_PASSWORD: ""
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'ubuntu-latest' && 'aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libayatana-appindicator3-dev

      - name: install frontend dependencies
        run: npm install

      - name: build frontend
        run: npm run build

      # --- ANDROID SIGNING SETUP ---
      - name: generate android keystore
        if: matrix.platform == 'ubuntu-latest'
        run: |
          keytool -genkey -v -keystore release.keystore -alias titan-alias -keyalg RSA -keysize 2048 -validity 10000 -storepass "titan123" -keypass "titan123" -dname "CN=Titan, OU=Compressor, O=TitanEngines, L=Delhi, S=Delhi, C=IN"
          echo "TITAN_KEYSTORE_PATH=${{ github.workspace }}/release.keystore" >> $GITHUB_ENV
          echo "TITAN_KEYSTORE_PASSWORD=titan123" >> $GITHUB_ENV

      # --- WINDOWS SIGNING SETUP ---
      - name: generate windows certificate
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $cert = New-SelfSignedCertificate -Type Custom -Subject "CN=TitanCompress" -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3") -KeyUsage DigitalSignature -FriendlyName "TitanCompress" -CertStoreLocation "Cert:\CurrentUser\My"
          $password = ConvertTo-SecureString -String "titan123" -Force -AsPlainText
          Export-PfxCertificate -Cert $cert -FilePath "titan.pfx" -Password $password
          echo "WINDOWS_CERTIFICATE_PATH=${{ github.workspace }}\titan.pfx" >> $env:GITHUB_ENV
          echo "WINDOWS_CERTIFICATE_PASSWORD=titan123" >> $env:GITHUB_ENV

      - name: build desktop (.exe)
        if: matrix.platform == 'windows-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WINDOWS_PFX: ${{ env.WINDOWS_CERTIFICATE_PATH }}
          WINDOWS_PFX_PASSWORD: ${{ env.WINDOWS_CERTIFICATE_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "Titan Compressor v__VERSION__"
          releaseBody: "SOTA Signed Build for Windows."
          releaseDraft: true
          prerelease: false

      - name: build mobile (.apk)
        if: matrix.platform == 'ubuntu-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_ANDROID_KEYSTORE_PATH: ${{ env.TITAN_KEYSTORE_PATH }}
          TAURI_ANDROID_KEYSTORE_PASSWORD: ${{ env.TITAN_KEYSTORE_PASSWORD }}
          TAURI_ANDROID_KEY_ALIAS: "titan-alias"
          TAURI_ANDROID_KEY_PASSWORD: "titan123"
        with:
          args: --mobile android
          tagName: v__VERSION__
          releaseName: "Titan Compressor Mobile v__VERSION__"
          releaseBody: "SOTA Signed Build for Android."
          releaseDraft: true
          prerelease: false
