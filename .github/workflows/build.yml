name: Build Titan Compressor APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: setup Android SDK
        uses: android-actions/setup-android@v3

      - name: install NDK
        run: sdkmanager "ndk;27.0.12077973"

      - name: install linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            imagemagick

      - name: generate RGBA PNG icon
        run: |
          mkdir -p src-tauri/icons
          convert -size 256x256 xc:"#1E90FF" -alpha on -define png:color-type=6 PNG32:src-tauri/icons/icon.png
          identify -verbose src-tauri/icons/icon.png | grep -E "Type|Colorspace|Alpha"

      - name: install frontend dependencies
        run: npm install

      - name: build frontend
        run: npm run build

      - name: init Tauri Android
        run: npm run tauri android init

      - name: generate android keystore
        run: |
          keytool -genkey -v \
            -keystore release.keystore \
            -alias titan-alias \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass titan123 -keypass titan123 \
            -dname "CN=Titan,OU=Compressor,O=TitanEngines,L=Delhi,ST=Delhi,C=IN"
          echo "TITAN_KEYSTORE_PATH=${{ github.workspace }}/release.keystore" >> $GITHUB_ENV
          echo "TITAN_KEYSTORE_PASSWORD=titan123" >> $GITHUB_ENV

      - name: build android APK
        run: npm run tauri android build -- --apk
        env:
          TAURI_ANDROID_KEYSTORE_PATH: ${{ env.TITAN_KEYSTORE_PATH }}
          TAURI_ANDROID_KEYSTORE_PASSWORD: ${{ env.TITAN_KEYSTORE_PASSWORD }}
          TAURI_ANDROID_KEY_ALIAS: titan-alias
          TAURI_ANDROID_KEY_PASSWORD: titan123
          NDK_HOME: ${{ env.ANDROID_NDK_ROOT }}

      - name: upload APK
        uses: actions/upload-artifact@v4
        with:
          name: titan-compressor-apk
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
