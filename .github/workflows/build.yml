name: Build Titan Compressor APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: setup Android SDK
        uses: android-actions/setup-android@v3

      - name: install NDK
        run: sdkmanager "ndk;27.0.12077973"

      - name: install linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            imagemagick

      - name: generate RGBA PNG icon
        run: |
          mkdir -p src-tauri/icons
          convert -size 256x256 xc:"#1E90FF" -alpha on -define png:color-type=6 PNG32:src-tauri/icons/icon.png
          identify -verbose src-tauri/icons/icon.png | grep -E "Type|Colorspace|Alpha"

      - name: generate android keystore
        run: |
          keytool -genkey -v \
            -keystore ${{ github.workspace }}/release.keystore \
            -alias titan-alias \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass titan123 -keypass titan123 \
            -dname "CN=Titan,OU=Compressor,O=TitanEngines,L=Delhi,ST=Delhi,C=IN"
          echo "KEYSTORE_PATH=${{ github.workspace }}/release.keystore" >> $GITHUB_ENV

      - name: install frontend dependencies
        run: npm install

      - name: build frontend
        run: npm run build

      - name: init Tauri Android
        run: npm run tauri android init

      - name: build android APK (unsigned)
        run: npm run tauri android build -- --apk
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_ROOT }}

      - name: sign APK with apksigner
        run: |
          BUILD_TOOLS="${ANDROID_SDK_ROOT}/build-tools/$(ls ${ANDROID_SDK_ROOT}/build-tools | sort -V | tail -1)"
          echo "Using build-tools: $BUILD_TOOLS"

          # Find the built APK
          UNSIGNED_APK=$(find src-tauri/gen/android/app/build/outputs/apk -name "*.apk" | head -1)
          echo "Found APK: $UNSIGNED_APK"

          # Step 1: zipalign (required before signing)
          ${BUILD_TOOLS}/zipalign -f -v 4 "$UNSIGNED_APK" app-aligned.apk

          # Step 2: Sign with apksigner
          ${BUILD_TOOLS}/apksigner sign \
            --ks ${{ env.KEYSTORE_PATH }} \
            --ks-key-alias titan-alias \
            --ks-pass pass:titan123 \
            --key-pass pass:titan123 \
            --out titan-compress-signed.apk \
            app-aligned.apk

          # Step 3: Verify signature
          ${BUILD_TOOLS}/apksigner verify --verbose titan-compress-signed.apk
          echo "✅ APK signed successfully"

      - name: upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: titan-compressor-signed-apk
          path: titan-compress-signed.apk
          if-no-files-found: error
